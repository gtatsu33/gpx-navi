<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d0d1a">
  <title>GPX ナビ</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #0d0d1a; --panel: #131328; --border: #1e1e3f;
      --accent: #00d4ff; --right: #ff4757; --left: #1e90ff;
      --slight: #ffa502; --go: #2ed573; --text: #f0f0f0; --muted: #666;
      --font-num: 'Barlow', sans-serif; --font-jp: 'Noto Sans JP', sans-serif;
      --sab: env(safe-area-inset-bottom, 0px);
      --sat: env(safe-area-inset-top, 0px);
    }

    html { height: 100%; }

    body {
      height: 100%;
      min-height: -webkit-fill-available;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-jp);
      overflow: hidden;
    }

    .screen {
      display: none;
      height: 100vh;
      height: 100dvh;
      flex-direction: column;
    }
    .screen.active { display: flex; }

    /* ══ LIST SCREEN ══ */
    #screen-list { background: var(--bg); overflow-y: auto; }

    .list-header {
      padding: 20px 20px 0;
      padding-top: max(20px, calc(var(--sat) + 12px));
      display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
    }
    .list-header h1 { font-family: var(--font-num); font-size: 24px; font-weight: 900; letter-spacing: -0.5px; color: var(--accent); }
    .list-header h1 span { color: var(--text); }
    .btn-add { background: var(--accent); color: var(--bg); border: none; border-radius: 10px; padding: 10px 18px; font-size: 15px; font-weight: 700; font-family: var(--font-jp); cursor: pointer; }

    .list-body {
      padding: 16px 20px;
      padding-bottom: calc(16px + var(--sab));
      flex: 1;
      overflow-y: auto;
    }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-state .empty-icon { font-size: 52px; margin-bottom: 16px; }
    .empty-state p { font-size: 16px; line-height: 1.7; }

    .route-card { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; margin-bottom: 12px; display: flex; align-items: center; gap: 14px; cursor: pointer; }
    .route-card:active { background: #1a1a35; }
    .route-icon { font-size: 32px; flex-shrink: 0; }
    .route-info { flex: 1; min-width: 0; }
    .route-name { font-size: 17px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .route-meta { font-size: 13px; color: var(--muted); margin-top: 3px; }
    .route-meta span { color: var(--accent); font-family: var(--font-num); font-weight: 600; }
    .btn-delete { background: none; border: 1px solid #333; color: #666; border-radius: 8px; padding: 7px 12px; font-size: 13px; cursor: pointer; flex-shrink: 0; }

    #import-progress { margin: 12px 20px; padding: 12px 16px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; font-size: 13px; color: var(--muted); display: none; }
    .progress-bar-wrap { height: 4px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; transition: width 0.3s; }

    /* ══ NAV SCREEN ══ */
    #screen-nav { position: relative; }
    #map { flex: 1; min-height: 0; z-index: 1; }

    #nav-panel {
      flex-shrink: 0;
      background: var(--panel);
      border-top: 2px solid var(--border);
      display: flex;
      flex-direction: column;
      padding-bottom: var(--sab);
    }

    #turn-primary { flex: 1; display: flex; align-items: center; padding: 10px 16px; gap: 12px; overflow: hidden; border-bottom: 1px solid var(--border); min-height: 90px; }
    #turn-arrow-wrap { width: 76px; height: 76px; border-radius: 14px; background: var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.3s; }
    #turn-arrow { font-size: 44px; line-height: 1; user-select: none; }
    #turn-info { flex: 1; min-width: 0; }
    #turn-distance { font-family: var(--font-num); font-size: 40px; font-weight: 900; line-height: 1; letter-spacing: -1px; white-space: nowrap; }
    #turn-direction { font-size: 18px; font-weight: 700; margin-top: 2px; color: #bbb; }

    #turn-next { padding: 7px 16px; font-size: 13px; color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
    #turn-next .next-label { color: #555; }
    #turn-next .next-val { color: #aaa; }

    #nav-controls {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px;
      flex-shrink: 0;
    }
    .ctrl-btn { background: var(--border); color: var(--text); border: none; border-radius: 9px; padding: 10px 12px; font-size: 14px; font-family: var(--font-jp); cursor: pointer; white-space: nowrap; }
    .ctrl-btn:active { opacity: 0.7; }
    #btn-voice.muted { color: var(--muted); }
    #nav-status { flex: 1; text-align: right; font-size: 12px; color: var(--muted); font-family: var(--font-num); }

    #btn-recenter { position: absolute; right: 14px; top: calc(14px + var(--sat)); z-index: 900; background: rgba(13,13,26,0.85); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 10px 12px; font-size: 18px; cursor: pointer; }

    #toast { position: fixed; bottom: calc(20px + var(--sab)); left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; z-index: 9999; display: none; max-width: 85vw; text-align: center; }

    .leaflet-control-zoom { border: none !important; }
    .leaflet-control-zoom a { background: rgba(13,13,26,0.85) !important; color: #fff !important; border: 1px solid var(--border) !important; }
    .leaflet-control-attribution { font-size: 10px !important; background: rgba(0,0,0,0.5) !important; color: #777 !important; }
    #debug-log {
      position: absolute; bottom: 220px; left: 8px; right: 8px;
      background: rgba(0,0,0,0.82); color: #0f0; font-family: monospace;
      font-size: 11px; padding: 6px 8px; border-radius: 8px;
      max-height: 140px; overflow-y: auto; z-index: 950;
      display: none;
    }
    #grade-canvas {
      position: absolute; bottom: 220px; left: 8px; right: 8px;
      height: 90px; border-radius: 8px; z-index: 950;
      background: rgba(0,0,0,0.82);
      display: none;
    }
    #btn-grade.grade-on { background: #1a3a2a; color: var(--go); border: 1px solid var(--go); }
  </style>
</head>
<body>

<div id="screen-list" class="screen active">
  <div class="list-header">
    <h1>GPX <span>ナビ</span></h1>
    <button class="btn-add" onclick="openFilePicker()">＋ ルート追加</button>
  </div>
  <div id="import-progress">
    <span id="import-msg">⏳ インポート中...</span>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
  </div>
  <div class="list-body" id="route-list-container"></div>
  <input type="file" id="file-input" accept=".gpx" style="display:none" onchange="handleFileImport(event)">
</div>

<div id="screen-nav" class="screen">
  <div id="map"></div>
  <button id="btn-recenter" onclick="recenter()"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg></button>
  <canvas id="grade-canvas" height="90"></canvas>
  <div id="debug-log"></div>
  <div id="nav-panel">
    <div id="turn-primary">
      <div id="turn-arrow-wrap"><div id="turn-arrow">⬆</div></div>
      <div id="turn-info">
        <div id="turn-distance">GPS待機中</div>
        <div id="turn-direction">—</div>
      </div>
    </div>
    <div id="turn-next"><span class="next-label">次：</span><span class="next-val">—</span></div>
    <div id="nav-controls">
      <button class="ctrl-btn" onclick="goBackToList()">← 一覧</button>
      <button class="ctrl-btn" id="btn-voice" onclick="toggleVoice()">🔊 音声</button>
      <button class="ctrl-btn" onclick="rerouteToNearest()">🔄 復帰</button>
      <button class="ctrl-btn" id="btn-grade" onclick="toggleGrade()">⛰ 勾配</button>
      <div id="nav-status">—</div>
    </div>
  </div>
</div>

<div id="toast"></div>


<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
'use strict';

// ── 定数 ──────────────────────────────────────────────
const DB_NAME      = 'gpxnav-db';
const DB_VERSION   = 1;
const STORE        = 'routes';
const TILE_URL     = 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
const PREFETCH_ZOOMS = [13, 14, 15];

// 音声案内距離
const ANNOUNCE_300 = 300;  // 「約Xm先」2回目の発話トリガー
const ANNOUNCE_100 = 100;  // 「まもなく」発話トリガー
const ANNOUNCE_AT  = 15;   // 「してください」発話トリガー

// 到達判定
const NEAR_DIST  = 25;   // m: この距離以内で「接近フラグ」ON
const DEPART_M   = 5;    // m: 最接近後これだけ遠ざかったら離脱とみなす

// 表示モード: false=勾配プロファイル, true=デバッグログ
const SHOW_DEBUG = false;

// ── 勾配プロファイル状態 ───────────────────────────────
let trackGrads    = [];  // { cumDist, ele, grade } per trkpt
let currentTrkIdx = 0;   // 現在地に最近接のtrkptインデックス
let gradeEnabled  = false; // 勾配表示ON/OFF（起動時はOFF）

// ── IndexedDB ─────────────────────────────────────────
let db;
function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => e.target.result.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror   = e => rej(e);
  });
}
const dbTx     = (mode, fn) => new Promise((res, rej) => { const req = fn(db.transaction(STORE, mode).objectStore(STORE)); req.onsuccess = e => res(e.target.result); req.onerror = rej; });
const dbSave   = r  => dbTx('readwrite', s => s.add(r));
const dbGetAll = () => dbTx('readonly',  s => s.getAll());
const dbDelete = id => dbTx('readwrite', s => s.delete(id));

// ── GPX Parser ────────────────────────────────────────
function parseGPX(text) {
  const doc = new DOMParser().parseFromString(text, 'text/xml');
  const NS  = 'http://www.topografix.com/GPX/1/1';
  // getElementsByTagNameNS と getElementsByTagName の両方を試し、
  // 多い方（実際に要素が入っている方）を使う。両方使うと重複する。
  const getEls = (p, t) => {
    const withNS = [...p.getElementsByTagNameNS(NS, t)];
    const withoutNS = [...p.getElementsByTagName(t)];
    return withNS.length >= withoutNS.length ? withNS : withoutNS;
  };
  const getText = (p, t) => { const el = getEls(p, t)[0]; return el ? el.textContent.trim() : ''; };

  const name = getText(doc, 'name') || getText(doc, 'n') || 'ルート';

  const track = [];
  let prevKey = null;
  for (const el of getEls(doc, 'trkpt')) {
    const lat = parseFloat(el.getAttribute('lat'));
    const lon = parseFloat(el.getAttribute('lon'));
    if (isNaN(lat) || isNaN(lon)) continue;
    const key = `${lat.toFixed(6)},${lon.toFixed(6)}`;
    if (key === prevKey) continue;
    prevKey = key;
    const ele = parseFloat(getText(el, 'ele'));
    track.push({ lat, lon, ele: isNaN(ele) ? null : ele });
  }

  const turns = getEls(doc, 'wpt').map(el => {
    const bc = parseFloat((getText(el, 'desc') || '').replace('bearing_change:', ''));
    return {
      lat:  parseFloat(el.getAttribute('lat')),
      lon:  parseFloat(el.getAttribute('lon')),
      name: getText(el, 'name') || getText(el, 'n') || '通過点',
      bearingChange: bc,
    };
  }).filter(p => !isNaN(p.lat) && !isNaN(p.lon));

  return { name, track, turns };
}

// ── Geo Utils ─────────────────────────────────────────
function geoDist(lat1, lon1, lat2, lon2) {
  const R = 6371000, dL = (lat2-lat1)*Math.PI/180, dN = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dL/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dN/2)**2;
  return R * 2 * Math.asin(Math.sqrt(Math.min(1, a)));
}
const formatDist = m => m >= 1000 ? `${(m/1000).toFixed(1)}km` : `${Math.round(m)}m`;

function latLonToTile(lat, lon, z) {
  const n = 2**z;
  return {
    x: Math.floor((lon+180)/360*n),
    y: Math.floor((1 - Math.log(Math.tan(lat*Math.PI/180) + 1/Math.cos(lat*Math.PI/180))/Math.PI)/2*n)
  };
}

// ── Tile Prefetch ─────────────────────────────────────
async function prefetchTiles(track, onProgress) {
  if (!('caches' in window)) { onProgress?.(1,1); return; }
  const tileSet = new Set();
  const step = Math.max(1, Math.floor(track.length/150));
  for (let i = 0; i < track.length; i += step) {
    for (const z of PREFETCH_ZOOMS) {
      const {x, y} = latLonToTile(track[i].lat, track[i].lon, z);
      for (let dx=-1; dx<=1; dx++) for (let dy=-1; dy<=1; dy++) tileSet.add(`${z}/${x+dx}/${y+dy}`);
    }
  }
  const tiles = [...tileSet];
  const cache = await caches.open('gpxnav-tiles-v1');
  let done = 0;
  for (const tile of tiles) {
    try {
      const url = `https://tile.openstreetmap.org/${tile}.png`;
      if (!await cache.match(url)) { const r = await fetch(url, {mode:'cors'}); if (r.ok) await cache.put(url, r); }
    } catch {}
    onProgress?.(++done, tiles.length);
    await new Promise(r => setTimeout(r, 50));
  }
}

// ── List Screen ───────────────────────────────────────
function openFilePicker() { document.getElementById('file-input').click(); }

// turns[] の各wptに trkIdx を付加する
function buildWptTrkMapping(track, turns) {
  return turns.map(wp => {
    let bestIdx = 0, bestD = Infinity;
    for (let i = 0; i < track.length; i++) {
      const d = geoDist(wp.lat, wp.lon, track[i].lat, track[i].lon);
      if (d < bestD) { bestD = d; bestIdx = i; }
    }
    return { ...wp, trkIdx: bestIdx };
  });
}
async function handleFileImport(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';
  let text;
  try { text = await file.text(); } catch { showToast('ファイル読み込み失敗'); return; }

  const parsed = parseGPX(text);
  if (parsed.track.length < 2) { showToast('GPXの解析に失敗しました'); return; }

  let totalDist = 0;
  for (let i = 1; i < parsed.track.length; i++)
    totalDist += geoDist(parsed.track[i-1].lat, parsed.track[i-1].lon, parsed.track[i].lat, parsed.track[i].lon);

  const route = { name: parsed.name, distKm: (totalDist/1000).toFixed(1), track: parsed.track, turns: buildWptTrkMapping(parsed.track, parsed.turns), importedAt: Date.now() };
  await dbSave(route);
  await renderRouteList();
  showToast(`「${route.name}」を追加 (${parsed.turns.length}ターン)`);

  const prog = document.getElementById('import-progress');
  const msg  = document.getElementById('import-msg');
  const bar  = document.getElementById('progress-bar');
  prog.style.display = 'block';
  prefetchTiles(parsed.track, (done, total) => {
    msg.textContent = `📡 オフライン用タイルキャッシュ中... ${Math.round(done/total*100)}%`;
    bar.style.width = Math.round(done/total*100) + '%';
  }).then(() => { prog.style.display = 'none'; showToast('キャッシュ完了 — オフライン走行可能です'); })
    .catch(() => { prog.style.display = 'none'; });
}

async function renderRouteList() {
  const routes = await dbGetAll();
  const el = document.getElementById('route-list-container');
  if (routes.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🗺️</div><p>ルートがありません<br>「＋ ルート追加」から<br>GPXファイルを読み込んでください</p></div>`;
    return;
  }
  el.innerHTML = routes.reverse().map(r => `
    <div class="route-card" onclick="startNavigationFromCard(${r.id})">
      <div class="route-icon">🚴</div>
      <div class="route-info">
        <div class="route-name">${escHtml(r.name)}</div>
        <div class="route-meta"><span>${r.distKm} km</span> &nbsp;|&nbsp; ターン ${r.turns.length}件</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
        <label onclick="event.stopPropagation()" style="display:flex;align-items:center;gap:5px;cursor:pointer;color:#aaa;font-size:13px;white-space:nowrap">
          <input type="checkbox" id="reverse-${r.id}"> 逆走
        </label>
        <button class="btn-delete" onclick="event.stopPropagation(); deleteRoute(${r.id})">削除</button>
      </div>
    </div>`).join('');
}

async function deleteRoute(id) {
  if (!confirm('このルートを削除しますか？')) return;
  await dbDelete(id);
  await renderRouteList();
}

const escHtml = s => s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

// ── Turn Styles ───────────────────────────────────────
function bcToTurnName(bc) {
  if (bc >  45) return '右折';
  if (bc >  15) return 'やや右';
  if (bc < -45) return '左折';
  if (bc < -15) return 'やや左';
  return '直進維持';
}

const TURN_STYLE = {
  '右折':     { arrow: '⇒', color: 'var(--right)',  bg: '#2a0808' },
  '左折':     { arrow: '⇐', color: 'var(--left)',   bg: '#08112a' },
  'やや右':   { arrow: '↗', color: 'var(--slight)', bg: '#2a1a08' },
  'やや左':   { arrow: '↖', color: 'var(--slight)', bg: '#1a082a' },
  '直進維持': { arrow: '⬆', color: 'var(--go)',     bg: '#082a14' },
};
const getTurnStyle = name => TURN_STYLE[name] || TURN_STYLE['直進維持'];

// ── Navigation State ──────────────────────────────────
// trkpt はマップ描画専用。ナビゲーションは wpt の座標だけで完結する。
// trackIdx / nearestIdx / cumDist は一切使わない。
let map = null, posMarker = null, targetMarker = null, currentRoute = null, watchId = null;

// waypoints[] : wpt をGPX順（=ルート順）に並べたもの + ゴールセンチネル
// 各要素: { lat, lon, name, isGoal }
let waypoints = [];
let targetIdx = 0;   // 次に目指すウェイポイントの番号

let voiceEnabled = true, followMode = true;
// 音声案内フェーズキュー（targetIdx が変わるたびに再構築）
// 各要素: { trigger: 'far'|'300'|'100'|'15', done: false }
// 'far' = 即発話（起点距離アナウンス）
// '300' = 300m付近で発話
// '100' = 100m以内で発話
// '15'  = 15m以内で発話
let announcePhases = [];
let phasesBuilt = false;  // ← ここに追加
let wakeLock = null;  // Screen Wake Lock

// ── 画面ログ（デバッグ用） ───────────────────────────
const MAX_LOG = 50;
function dbgLog(msg) {
  const el = document.getElementById('debug-log');
  if (!el) return;
  const t = new Date().toTimeString().slice(0,8);
  const line = document.createElement('div');
  line.textContent = `${t} ${msg}`;
  el.appendChild(line);
  while (el.children.length > MAX_LOG) el.removeChild(el.firstChild);
  el.scrollTop = el.scrollHeight;
  console.log(msg);
}
// ── 勾配プロファイル関連 ──────────────────────────────

function buildTrackGrads(track) {
  if (!track || track.length < 2) return [];
  if (!track.some(p => p.ele != null)) return [];

  const cumDists = [0];
  for (let i = 1; i < track.length; i++)
    cumDists.push(cumDists[i-1] + geoDist(track[i-1].lat, track[i-1].lon, track[i].lat, track[i].lon));

  // ① スムージング（窓幅を広げてノイズを除去）
  const smooth = track.map((_, i) => {
    let sum = 0, weightSum = 0;
    const R = 40; // 前後40mを参照
    for (let j = Math.max(0, i - 15); j < Math.min(track.length, i + 15); j++) {
      const d = Math.abs(cumDists[i] - cumDists[j]);
      if (d <= R) {
        const w = 1 - d / R;
        sum += track[j].ele * w;
        weightSum += w;
      }
    }
    return weightSum > 0 ? sum / weightSum : track[i].ele;
  });

  // ② 中央差分による勾配計算（見た目の位置ズレを解消）
  const GRADE_WIN = 20; // 前後20m（計40m）で判定
  return track.map((_, i) => {
    let grade = 0;
    let pIdx = i, nIdx = i;
    while (pIdx > 0 && cumDists[i] - cumDists[pIdx] < GRADE_WIN) pIdx--;
    while (nIdx < track.length - 1 && cumDists[nIdx] - cumDists[i] < GRADE_WIN) nIdx++;

    const dist = cumDists[nIdx] - cumDists[pIdx];
    if (dist > 15) { // 最低15m以上の区間で計算
      grade = ((smooth[nIdx] - smooth[pIdx]) / dist) * 100;
    }
    return { 
      cumDist: cumDists[i], 
      ele: smooth[i], 
      grade: Math.max(-25, Math.min(25, grade)) 
    };
  });
}


function gradeColor(g) {
  if (g < 3)   return '#2ed573';  // 下り〜ほぼ平坦: 緑
  if (g < 6)   return '#ffd32a';  // やや上り: 黄
  if (g < 9)   return '#ff6348';  // 上り: オレンジ
  if (g < 12)  return '#ff0000';  // 急坂: 赤
  return '#4C2E30';               // 激坂: エンジ
}

function updateCurrentTrkIdx(lat, lon) {
  if (!currentRoute) return;
  const track = currentRoute.track;
  const s = Math.max(0, currentTrkIdx - 5);
  const e = Math.min(track.length - 1, currentTrkIdx + 60);
  let bestD = Infinity, bestI = currentTrkIdx;
  for (let i = s; i <= e; i++) {
    const d = geoDist(lat, lon, track[i].lat, track[i].lon);
    if (d < bestD) { bestD = d; bestI = i; }
  }
  currentTrkIdx = bestI;
}

function renderGradeCanvas() {
  const canvas = document.getElementById('grade-canvas');
  if (!canvas) return;

  // CSSレイアウト後の実幅をcanvas座標系に反映
  const cssW = canvas.offsetWidth;
  if (cssW > 0 && canvas.width !== cssW) canvas.width = cssW;

  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  if (!trackGrads.length) {
    ctx.fillStyle = '#666';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('標高データなし（GPXにELEタグが必要）', 8, H / 2 + 4);
    return;
  }

  const LABEL_H = 14, PH = H - LABEL_H;
  const LOOKAHEAD = 1000;
  const startDist = (trackGrads[currentTrkIdx] ?? trackGrads[0]).cumDist;
  const endDist   = startDist + LOOKAHEAD;

  const pts = trackGrads.filter(p => p.cumDist >= startDist && p.cumDist <= endDist && p.ele != null);
  if (pts.length < 2) {
    ctx.fillStyle = '#666'; ctx.font = '11px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText('コース終端付近', 8, H / 2 + 4);
    return;
  }

  const eleMin = Math.min(...pts.map(p => p.ele));
  const eleMax = Math.max(...pts.map(p => p.ele));
  const eleRange = Math.max(eleMax - eleMin, 10);
  const xOf = d => Math.round(((d - startDist) / LOOKAHEAD) * W);
  const yOf = e => PH - 2 - ((e - eleMin) / eleRange) * (PH - 20);

  // 同色の連続セグメントを1パスでまとめて描画（縦筋防止）
  let si = 1;
  while (si < pts.length) {
    // 基準となる勾配（現在地点ではなく、この区間の勾配を代表させる）
    const color = gradeColor(pts[si].grade);
    let ei = si;
    while (ei < pts.length && gradeColor(pts[ei].grade) === color) ei++;

    ctx.beginPath();
    // 塗りつぶしの底辺（左から右へ）
    ctx.moveTo(xOf(pts[si-1].cumDist), PH);
    // 山の形（稜線）に沿って描画
    ctx.lineTo(xOf(pts[si-1].cumDist), yOf(pts[si-1].ele));
    for (let k = si; k < ei; k++) {
      ctx.lineTo(xOf(pts[k].cumDist), yOf(pts[k].ele));
    }
    // 塗りつぶしの右端を底に落とす
    ctx.lineTo(xOf(pts[ei-1].cumDist), PH);
    ctx.closePath();

    ctx.fillStyle = color;
    ctx.fill();
    si = ei;
  }

  // 稜線
  ctx.beginPath();
  ctx.moveTo(xOf(pts[0].cumDist), yOf(pts[0].ele));
  for (let i = 1; i < pts.length; i++) ctx.lineTo(xOf(pts[i].cumDist), yOf(pts[i].ele));
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // 現在地ライン（左端）
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(2, 0); ctx.lineTo(2, PH); ctx.stroke();

  // 距離ラベル
  ctx.fillStyle = '#999'; ctx.font = '10px sans-serif';
  ctx.textAlign = 'left';   ctx.fillText('現在', 5, H - 2);
  ctx.textAlign = 'center'; ctx.fillText('500m', W / 2, H - 2);
  ctx.textAlign = 'right';  ctx.fillText('1km', W - 2, H - 2);

  // 現在勾配（右上に大きく）
  const g = trackGrads[currentTrkIdx]?.grade;
  if (g != null) {
    const sign = g > 0 ? '+' : '';
    ctx.fillStyle = gradeColor(g);
    ctx.font = 'bold 15px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(`${sign}${g.toFixed(1)}%`, W - 4, 16);
  }
}

// 通過判定ステート（targetIdx が進むたびにリセット）
let nearTarget    = false;
let minDistTarget = Infinity;
let prevDistNext  = Infinity;

// ── Navigation Start ──────────────────────────────────
function startNavigationFromCard(id) {
  const rev = document.getElementById(`reverse-${id}`)?.checked ?? false;
  startNavigation(id, rev);
}

async function startNavigation(routeId, isReverse = false) {
  unlockAudio(); // awaitより前：ユーザージェスチャーのコンテキスト内で音声を解放
  const routes = await dbGetAll();
  currentRoute = routes.find(r => r.id === routeId);
  phasesBuilt = false;

  if (!currentRoute) return;

  if (isReverse) {
    const n = currentRoute.track.length;
    currentRoute = {
      ...currentRoute,
      track: currentRoute.track.slice().reverse(),
      turns: currentRoute.turns.slice().reverse().map(t => ({
        ...t, trkIdx: n - 1 - t.trkIdx, name: bcToTurnName(-t.bearingChange)
      }))
    };
  }

  announcePhases = [];
  nearTarget    = false;
  minDistTarget = Infinity;
  prevDistNext  = Infinity;
  followMode = true;
  currentTrkIdx = 0;
  trackGrads = buildTrackGrads(currentRoute.track);
  gradeEnabled = false;
  voiceEnabled = true;
  document.getElementById('btn-voice').textContent = '🔊 音声';
  document.getElementById('btn-voice').classList.remove('muted');

  const track = currentRoute.track;

  // ウェイポイント配列を構築：GPX順のターン + ゴールセンチネル
  // trkpt へのマッピング不要。座標をそのまま使う。
  waypoints = [
    ...currentRoute.turns.map(t => ({
      lat: t.lat, lon: t.lon, name: t.name, isGoal: false, trkIdx: t.trkIdx
    })),
    { lat: track[track.length - 1].lat, lon: track[track.length - 1].lon,
      name: 'ゴール', isGoal: true }
  ];
  targetIdx = 0;

  showScreen('nav');
  requestAnimationFrame(() => setTimeout(initMap, 50));
}

// ── Map Init ──────────────────────────────────────────
function initMap() {
  if (map) { map.remove(); map = null; }
  targetMarker = null;
  // デバッグログ表示切り替え
  document.getElementById('debug-log').style.display = SHOW_DEBUG ? 'block' : 'none';
  // 勾配キャンバスは gradeEnabled に従う（起動時は非表示）
  document.getElementById('grade-canvas').style.display = 'none';
  const btnGrade = document.getElementById('btn-grade');
  if (btnGrade) { btnGrade.classList.remove('grade-on'); }
  const track = currentRoute.track;
  map = L.map('map', { zoomControl: true }).setView([track[0].lat, track[0].lon], 15);
  L.tileLayer(TILE_URL, { attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>', maxZoom: 19, maxNativeZoom: 18 }).addTo(map);

  // trkpt でルートを描画
  L.polyline(track.map(p => [p.lat, p.lon]), { color: '#00d4ff', weight: 5, opacity: 0.75 }).addTo(map);
  L.marker([track[0].lat, track[0].lon],
    { icon: L.divIcon({ html: '<div style="font-size:22px">🟢</div>', iconSize:[22,22], iconAnchor:[11,11], className:'' }) })
    .bindTooltip('スタート').addTo(map);
  L.marker([track[track.length-1].lat, track[track.length-1].lon],
    { icon: L.divIcon({ html: '<div style="font-size:22px">🏁</div>', iconSize:[22,22], iconAnchor:[11,11], className:'' }) })
    .bindTooltip('ゴール').addTo(map);

  // ターンポイントをマップに描画（ゴールセンチネルは除く）
  waypoints.filter(wp => !wp.isGoal).forEach((wp, i) => {
    const s = getTurnStyle(bcToTurnName(wp.bearingChange));
    L.circleMarker([wp.lat, wp.lon], { radius:7, color:s.color, fillColor:s.color, fillOpacity:0.9, weight:2 })
     .bindTooltip(`${i+1}. ${s.arrow} ${wp.name}`).addTo(map);
  });

  posMarker = L.marker([track[0].lat, track[0].lon], {
    icon: L.divIcon({
      html: '<div style="width:18px;height:18px;background:#ff4757;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(255,71,87,0.6)"></div>',
      iconSize:[18,18], iconAnchor:[9,9], className:''
    }), zIndexOffset: 1000
  });

  map.on('dragstart', () => { followMode = false; });
  map.fitBounds(L.polyline(track.map(p=>[p.lat,p.lon])).getBounds(), { padding:[30,30] });

  updateTargetMarker();
  startGPS();
}

// ── 現在ターゲットに旗マーカーを表示 ─────────────────
function updateTargetMarker() {
  if (!map) return;
  if (targetIdx >= waypoints.length) {
    if (targetMarker) { map.removeLayer(targetMarker); targetMarker = null; }
    return;
  }
  const wp = waypoints[targetIdx];
  const icon = L.divIcon({
    html: `<div style="font-size:28px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.8))">${wp.isGoal ? '🏁' : '🚩'}</div>`,
    iconSize: [28, 28], iconAnchor: [4, 28], className: ''
  });
  if (targetMarker) {
    targetMarker.setLatLng([wp.lat, wp.lon]).setIcon(icon);
  } else {
    targetMarker = L.marker([wp.lat, wp.lon], { icon, zIndexOffset: 900 }).addTo(map);
  }
  targetMarker.bindTooltip(`🎯 目標[${targetIdx}]: ${wp.name}`, { permanent: false });
  const statusText = `[${targetIdx}/${waypoints.length-1}] ${wp.name}`;
  document.getElementById('nav-status').textContent = statusText;
  dbgLog(`[TGT] ${targetIdx}/${waypoints.length-1} "${wp.name}" goal=${wp.isGoal}`);
  // posMarker が存在すれば現在地からd0を計算してフェーズ構築
  if (posMarker && map && map.hasLayer(posMarker)) {
    const pos = posMarker.getLatLng();
    const d0 = geoDist(pos.lat, pos.lng, wp.lat, wp.lon);
    buildAnnouncePhases(d0, wp.name, wp.isGoal);
  }
}

// ── 音声案内フェーズ構築 ──────────────────────────────
// targetIdx が変わった瞬間（posMarker が現在地にいる前提）に呼ぶ。
// d0: 現在地 → 新しい目標までの距離
function buildAnnouncePhases(d0, wpName, isGoal) {
  const label = isGoal ? 'ゴール' : wpName;
  const round50 = d => Math.round(d / 50) * 50;
  phasesBuilt = true;  // ← 追加

  if (d0 > 300) {
    // ①即発話 ②300m付近 ③100m ④15m
    announcePhases = [
      { trigger: 'far',  text: `約${round50(d0)}メートル先、${label}です` },
      { trigger: '300',  text: `約${round50(300)}メートル先、${label}です` },
      { trigger: '100',  text: isGoal ? 'まもなくゴールです' : `まもなく${label}です` },
      { trigger: '15',   text: isGoal ? 'ゴールです' : `${label}してください` },
    ];
  } else if (d0 > 100) {
    // ①即発話 ②100m ③15m
    announcePhases = [
      { trigger: 'far',  text: `約${round50(d0)}メートル先、${label}です` },
      { trigger: '100',  text: isGoal ? 'まもなくゴールです' : `まもなく${label}です` },
      { trigger: '15',   text: isGoal ? 'ゴールです' : `${label}してください` },
    ];
  } else if (d0 > 15) {
    // ①即発話（まもなく） ②15m
    announcePhases = [
      { trigger: 'far',  text: isGoal ? 'まもなくゴールです' : `まもなく${label}です` },
      { trigger: '15',   text: isGoal ? 'ゴールです' : `${label}してください` },
    ];
  } else {
    // ①即発話（してください）
    announcePhases = [
      { trigger: 'far',  text: isGoal ? 'ゴールです' : `${label}してください` },
    ];
  }
  dbgLog(`[ANN] d0=${Math.round(d0)}m phases=${announcePhases.map(p=>p.trigger).join(',')}`);
  // 'far' は2秒後に発話（「ナビを開始します」との競合を避けるため）
  if (announcePhases.length > 0 && announcePhases[0].trigger === 'far') {
    const farText = announcePhases.shift().text;
    setTimeout(() => speak(farText), 2000);
  }
}

// ── 音声案内発火チェック ──────────────────────────────
// GPS更新ごとに呼ぶ。先頭フェーズの条件を満たしたら発話してshift()。
function checkAnnounce(dist) {
  if (announcePhases.length === 0) return;
  const phase = announcePhases[0];
  const fire =
    (phase.trigger === '300' && dist <= ANNOUNCE_300) ||
    (phase.trigger === '100' && dist <= ANNOUNCE_100) ||
    (phase.trigger === '15'  && dist <= ANNOUNCE_AT);
  if (fire) {
    speak(phase.text);
    announcePhases.shift();
    // 次のフェーズも同時に条件を満たす場合は再帰チェック
    checkAnnounce(dist);
  }
}

// ── GPS ───────────────────────────────────────────────
function startGPS() {
  if (!navigator.geolocation) { setNavMsg('⚠', 'GPS非対応', ''); return; }
  acquireWakeLock();  // ナビ開始時にスリープ防止
  unlockAudio(() => speak('ナビを開始します'));
  watchId = navigator.geolocation.watchPosition(
    onGPSUpdate,
    () => { document.getElementById('nav-status').textContent = 'GPS取得中...'; },
    { enableHighAccuracy: true, maximumAge: 2000, timeout: 15000 }
  );
}

function onGPSUpdate(pos) {
  const lat = pos.coords.latitude, lon = pos.coords.longitude;
  posMarker.setLatLng([lat, lon]);
  // GPS初回取得時、まだフェーズが構築されていなければ現在地から構築
  if (!phasesBuilt && targetIdx < waypoints.length) {
    const wp = waypoints[targetIdx];
    const d0 = geoDist(lat, lon, wp.lat, wp.lon);
    buildAnnouncePhases(d0, wp.name, wp.isGoal);
  }
  if (!map.hasLayer(posMarker)) posMarker.addTo(map);
  if (followMode) map.setView([lat, lon], map.getZoom());
  document.getElementById('nav-status').textContent = `±${Math.round(pos.coords.accuracy)}m`;
  if (gradeEnabled && !SHOW_DEBUG) {
    updateCurrentTrkIdx(lat, lon);
    renderGradeCanvas();
  }
  updateNavPanel(lat, lon);
}

// ── ウェイポイント到達チェック ────────────────────────
// 判定ロジック（ターンポイント）：
//   ① dist < NEAR_DIST(10m)         → 接近フラグON・最近接距離を更新
//   ② 接近後 dist > 最近接 + DEPART_M → 遠ざかり始めた
//   ③ 次wptへの距離 < 前回値          → 次wptに近づいている
//   ①②③ 全クリアで通過確定（次wptなしなら③省略）
//
// 逐次処理により「全ターン通過後のみゴール判定」が自然に実現する。
function checkWaypointAdvance(lat, lon) {
  let changed = false;

  while (targetIdx < waypoints.length) {
    const wp   = waypoints[targetIdx];
    const dist = geoDist(lat, lon, wp.lat, wp.lon);
    const next = waypoints[targetIdx + 1];

    // ゴールは30m以内で確定。
    // 逐次処理により全ターン通過後にしかここに到達しないため
    // NEAR_DIST より大きい閾値を使ってよい（GPS誤差を吸収）。
    if (wp.isGoal) {
      if (dist < 30) {
        setNavMsg('🏁', 'ゴール！', 'お疲れ様でした！');
        speakNow('ゴールです。お疲れ様でした！');
        document.getElementById('turn-next').innerHTML =
          '<span class="next-label">次：</span><span class="next-val">コース完走！</span>';
        targetIdx++;
        phasesBuilt = false;  // ← 追加
        changed = true;
      }
      break;
    }

    // ① 最近接距離更新・接近フラグ
    if (dist < minDistTarget) minDistTarget = dist;
    if (dist < NEAR_DIST)     nearTarget    = true;

    if (!nearTarget) {
      // まだ 10m 以内に入っていない
      if (next && !next.isGoal) prevDistNext = geoDist(lat, lon, next.lat, next.lon);
      break;
    }

    // ② 遠ざかりチェック
    if (dist <= minDistTarget + DEPART_M) {
      if (next && !next.isGoal) prevDistNext = geoDist(lat, lon, next.lat, next.lon);
      break;
    }

    // ③ 次wptへの接近チェック
    // ただし次がゴールの場合はスキップ。
    // 理由：周回コースではゴール＝スタート付近にあるため、
    //       最後のターンを通過した直後は「ゴールから遠ざかる方向」に
    //       なりやすく、条件③が永遠に満たされない。
    if (next && !next.isGoal) {
      const dn = geoDist(lat, lon, next.lat, next.lon);
      if (dn > prevDistNext + 5) {
        // 次wptから5m超遠ざかっている（GPS誤差±5mを許容）
        prevDistNext = dn;
        break;
      }
      prevDistNext = dn;
    }

    // ①②③ 全クリア → 通過確定
    dbgLog(`[ARRIVE] "${wp.name}" min=${Math.round(minDistTarget)}m d=${Math.round(dist)}m`);
    targetIdx++;
    nearTarget = false; minDistTarget = Infinity; prevDistNext = Infinity;
    changed = true;
    // 次のターゲットへのフェーズ構築は updateTargetMarker → buildAnnouncePhases で行う
  }

  if (changed) updateTargetMarker();
}

// ── パネル更新 ────────────────────────────────────────
function updateNavPanel(lat, lon) {
  checkWaypointAdvance(lat, lon);
  if (targetIdx >= waypoints.length) return;

  const wp = waypoints[targetIdx];
  const s  = wp.isGoal ? getTurnStyle('直進維持') : getTurnStyle(bcToTurnName(wp.bearingChange));
  // trkpt 不使用。GPS座標から wpt への直線距離で表示。
  const dist = geoDist(lat, lon, wp.lat, wp.lon);

  document.getElementById('turn-arrow-wrap').style.background = s.bg;
  document.getElementById('turn-arrow').textContent           = s.arrow;
  document.getElementById('turn-arrow').style.color           = s.color;
  document.getElementById('turn-distance').textContent        = formatDist(dist);
  document.getElementById('turn-distance').style.color        = s.color;
  document.getElementById('turn-direction').textContent       = wp.isGoal ? 'このままゴールへ' : `先 ${wp.name}`;

  // 次のウェイポイント情報
  const next = waypoints[targetIdx + 1];
  if (next && !wp.isGoal) {
    const ns  = next.isGoal ? getTurnStyle('直進維持') : getTurnStyle(bcToTurnName(next.bearingChange));
    const nd  = geoDist(lat, lon, next.lat, next.lon);
    document.getElementById('turn-next').innerHTML = next.isGoal
      ? `<span class="next-label">次：</span><span class="next-val">このターン後はゴールまで直進</span>`
      : `<span class="next-label">次：</span><span class="next-val" style="color:${ns.color}">${ns.arrow} ${next.name}</span><span class="next-val">　${formatDist(nd)}先</span>`;
  } else if (!wp.isGoal) {
    document.getElementById('turn-next').innerHTML =
      `<span class="next-label">次：</span><span class="next-val">このターン後はゴールまで直進</span>`;
  }

  // 音声案内フェーズチェック
  checkAnnounce(dist);
}

function setNavMsg(arrow, dist, dir) {
  document.getElementById('turn-arrow').textContent     = arrow;
  document.getElementById('turn-distance').textContent  = dist;
  document.getElementById('turn-direction').textContent = dir;
}

// ── 復帰ボタン ────────────────────────────────────────
// 現在地から最も近いウェイポイント（ゴール含む）を次のターゲットに設定する
function rerouteToNearest() {
  if (!currentRoute || !posMarker) return;
  dbgLog(`[REROUTE] called, targetIdx was ${targetIdx}`);
  const pos   = posMarker.getLatLng();
  const track = currentRoute.track;

  // ① 現在地に最も近いtrkptのインデックスを求める
  let nearestTrkIdx = 0, bestD = Infinity;
  for (let i = 0; i < track.length; i++) {
    const d = geoDist(pos.lat, pos.lng, track[i].lat, track[i].lon);
    if (d < bestD) { bestD = d; nearestTrkIdx = i; }
  }
  dbgLog(`[REROUTE] nearest trkpt[${nearestTrkIdx}] d=${Math.round(bestD)}m`);

  // ② 各wptのtrkIdxと比較して、nearestTrkIdx以降で最初のwptを選ぶ
  // （ゴールセンチネルはtrkIdxを持たないため除外し、デフォルトはゴール）
  let bestWpIdx = waypoints.length - 1;
  for (let wi = 0; wi < waypoints.length; wi++) {
    const wp = waypoints[wi];
    if (wp.isGoal) break;  // ゴールセンチネルはスキップ
    if (wp.trkIdx >= nearestTrkIdx) { bestWpIdx = wi; break; }
  }
  dbgLog(`[REROUTE] → wpt[${bestWpIdx}] "${waypoints[bestWpIdx].name}"`);

  // 通過判定ステートをリセット
  nearTarget    = false;
  minDistTarget = Infinity;
  prevDistNext  = Infinity;
  phasesBuilt   = false;

  targetIdx = bestWpIdx;
  updateTargetMarker();
  const wp = waypoints[bestWpIdx];
  const dWp = geoDist(pos.lat, pos.lng, wp.lat, wp.lon);
  showToast(`「${wp.name}」へ復帰（${Math.round(dWp)}m先）`);
  updateNavPanel(pos.lat, pos.lng);
}

// ── Recenter ──────────────────────────────────────────
function recenter() {
  followMode = true;
  if (posMarker && map.hasLayer(posMarker))
    map.setView(posMarker.getLatLng(), Math.max(map.getZoom(), 15));
}

// ── Wake Lock ────────────────────────────────────────
async function acquireWakeLock() {
  if (!('wakeLock' in navigator)) {
    dbgLog('[WAKE] Screen Wake Lock 非対応');
    return;
  }
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    dbgLog('[WAKE] スリープ防止 ON');
    // バックグラウンドから復帰したとき自動で再取得
    wakeLock.addEventListener('release', () => {
      dbgLog('[WAKE] 解放 → 再取得試みます');
    });
  } catch (e) {
    dbgLog(`[WAKE] 取得失敗: ${e.message}`);
  }
}

async function releaseWakeLock() {
  if (wakeLock) {
    await wakeLock.release();
    wakeLock = null;
    dbgLog('[WAKE] スリープ防止 OFF');
  }
}

// タブが再び表示されたとき（スリープ復帰など）にWake Lockを再取得
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && currentRoute && !watchId === false) {
    dbgLog('[WAKE] 画面復帰 → Wake Lock 再取得');
    await acquireWakeLock();
  }
});

// ── Voice ─────────────────────────────────────────────
function unlockAudio(callback) {
  if (!('speechSynthesis' in window)) { callback && callback(); return; }
  const d = new SpeechSynthesisUtterance(' ');
  d.volume = 0; d.lang = 'ja-JP';
  if (callback) d.onend = callback;
  speechSynthesis.speak(d);
}

function speak(text) {
  if (!voiceEnabled || !('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP'; u.rate = 1.0; u.pitch = 1.0; u.volume = 1.0;
  speechSynthesis.speak(u);
}

// speak の別名（廃止したキューの名残を置換するため残す）
const speakNow = speak;

function toggleVoice() {
  voiceEnabled = !voiceEnabled;
  const btn = document.getElementById('btn-voice');
  if (voiceEnabled) { btn.textContent='🔊 音声'; btn.classList.remove('muted'); speak('音声案内を開始します'); }
  else              { speechSynthesis.cancel(); btn.textContent='🔇 音声'; btn.classList.add('muted'); }
}

function toggleGrade() {
  gradeEnabled = !gradeEnabled;
  const btn    = document.getElementById('btn-grade');
  const canvas = document.getElementById('grade-canvas');
  if (gradeEnabled) {
    canvas.style.display = 'block';
    btn.classList.add('grade-on');
    // 現在地が取得済みならインデックスを即時更新して描画
    if (posMarker && map && map.hasLayer(posMarker)) {
      const pos = posMarker.getLatLng();
      updateCurrentTrkIdx(pos.lat, pos.lng);
    }
    renderGradeCanvas();
  } else {
    canvas.style.display = 'none';
    btn.classList.remove('grade-on');
  }
}

// ── Screen ────────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${name}`).classList.add('active');
  if (name === 'nav') setTimeout(() => map && map.invalidateSize(), 100);
}
function goBackToList() {
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  if ('speechSynthesis' in window) speechSynthesis.cancel();
  releaseWakeLock();  // ナビ終了時にスリープ防止解除
  showScreen('list'); renderRouteList();
}

// ── Toast ─────────────────────────────────────────────
let toastTimer;
function showToast(msg, ms=3500) {
  clearTimeout(toastTimer);
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.display = 'block';
  toastTimer = setTimeout(() => { el.style.display = 'none'; }, ms);
}

// ── Service Worker ────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(e => console.warn('SW:', e)));
}

// ── Init ──────────────────────────────────────────────
openDB().then(renderRouteList);
</script>
