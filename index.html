<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d0d1a">
  <title>GPX ナビ</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #0d0d1a; --panel: #131328; --border: #1e1e3f;
      --accent: #00d4ff; --right: #ff4757; --left: #1e90ff;
      --slight: #ffa502; --go: #2ed573; --text: #f0f0f0; --muted: #666;
      --font-num: 'Barlow', sans-serif; --font-jp: 'Noto Sans JP', sans-serif;
      --sab: env(safe-area-inset-bottom, 0px);
      --sat: env(safe-area-inset-top, 0px);
    }

    html { height: 100%; }

    body {
      height: 100%;
      /* safe areaを含む全領域を使う */
      min-height: -webkit-fill-available;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-jp);
      overflow: hidden;
    }

    .screen {
      display: none;
      /* dvhが使えるブラウザはそちらを優先、fallbackは-webkit-fill-available */
      height: 100vh;
      height: 100dvh;
      flex-direction: column;
    }
    .screen.active { display: flex; }

    /* ══ LIST SCREEN ══ */
    #screen-list { background: var(--bg); overflow-y: auto; }

    .list-header {
      padding: 20px 20px 0;
      /* iPhoneのノッチ対応 */
      padding-top: max(20px, calc(var(--sat) + 12px));
      display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
    }
    .list-header h1 { font-family: var(--font-num); font-size: 24px; font-weight: 900; letter-spacing: -0.5px; color: var(--accent); }
    .list-header h1 span { color: var(--text); }
    .btn-add { background: var(--accent); color: var(--bg); border: none; border-radius: 10px; padding: 10px 18px; font-size: 15px; font-weight: 700; font-family: var(--font-jp); cursor: pointer; }

    .list-body {
      padding: 16px 20px;
      /* ホームバー分の余白 */
      padding-bottom: calc(16px + var(--sab));
      flex: 1;
      overflow-y: auto;
    }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-state .empty-icon { font-size: 52px; margin-bottom: 16px; }
    .empty-state p { font-size: 16px; line-height: 1.7; }

    .route-card { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; margin-bottom: 12px; display: flex; align-items: center; gap: 14px; cursor: pointer; }
    .route-card:active { background: #1a1a35; }
    .route-icon { font-size: 32px; flex-shrink: 0; }
    .route-info { flex: 1; min-width: 0; }
    .route-name { font-size: 17px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .route-meta { font-size: 13px; color: var(--muted); margin-top: 3px; }
    .route-meta span { color: var(--accent); font-family: var(--font-num); font-weight: 600; }
    .btn-delete { background: none; border: 1px solid #333; color: #666; border-radius: 8px; padding: 7px 12px; font-size: 13px; cursor: pointer; flex-shrink: 0; }

    #import-progress { margin: 12px 20px; padding: 12px 16px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; font-size: 13px; color: var(--muted); display: none; }
    .progress-bar-wrap { height: 4px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; transition: width 0.3s; }

    /* ══ NAV SCREEN ══ */
    #screen-nav { position: relative; }
    #map { flex: 1; min-height: 0; z-index: 1; }

    #nav-panel {
      flex-shrink: 0;
      background: var(--panel);
      border-top: 2px solid var(--border);
      display: flex;
      flex-direction: column;
      /* ホームバー分を上乗せした高さ */
      padding-bottom: var(--sab);
    }

    #turn-primary { flex: 1; display: flex; align-items: center; padding: 10px 16px; gap: 12px; overflow: hidden; border-bottom: 1px solid var(--border); min-height: 90px; }
    #turn-arrow-wrap { width: 76px; height: 76px; border-radius: 14px; background: var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.3s; }
    #turn-arrow { font-size: 44px; line-height: 1; user-select: none; }
    #turn-info { flex: 1; min-width: 0; }
    #turn-distance { font-family: var(--font-num); font-size: 40px; font-weight: 900; line-height: 1; letter-spacing: -1px; white-space: nowrap; }
    #turn-direction { font-size: 18px; font-weight: 700; margin-top: 2px; color: #bbb; }

    #turn-next { padding: 7px 16px; font-size: 13px; color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
    #turn-next .next-label { color: #555; }
    #turn-next .next-val { color: #aaa; }

    #nav-controls {
      display: flex; align-items: center; gap: 8px;
      /* 上下パディング固定、safe areaはnav-panel側のpadding-bottomで吸収 */
      padding: 10px 14px;
      flex-shrink: 0;
    }
    .ctrl-btn { background: var(--border); color: var(--text); border: none; border-radius: 9px; padding: 10px 12px; font-size: 14px; font-family: var(--font-jp); cursor: pointer; white-space: nowrap; }
    .ctrl-btn:active { opacity: 0.7; }
    #btn-voice.muted { color: var(--muted); }
    #nav-status { flex: 1; text-align: right; font-size: 12px; color: var(--muted); font-family: var(--font-num); }

    #btn-recenter { position: absolute; right: 14px; top: calc(14px + var(--sat)); z-index: 900; background: rgba(13,13,26,0.85); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 10px 12px; font-size: 18px; cursor: pointer; }

    #toast { position: fixed; bottom: calc(20px + var(--sab)); left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; z-index: 9999; display: none; max-width: 85vw; text-align: center; }

    .leaflet-control-zoom { border: none !important; }
    .leaflet-control-zoom a { background: rgba(13,13,26,0.85) !important; color: #fff !important; border: 1px solid var(--border) !important; }
    .leaflet-control-attribution { font-size: 10px !important; background: rgba(0,0,0,0.5) !important; color: #777 !important; }
  </style>
</head>
<body>

<div id="screen-list" class="screen active">
  <div class="list-header">
    <h1>GPX <span>ナビ</span></h1>
    <button class="btn-add" onclick="openFilePicker()">＋ ルート追加</button>
  </div>
  <div id="import-progress">
    <span id="import-msg">⏳ インポート中...</span>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
  </div>
  <div class="list-body" id="route-list-container"></div>
  <input type="file" id="file-input" accept=".gpx" style="display:none" onchange="handleFileImport(event)">
</div>

<div id="screen-nav" class="screen">
  <div id="map"></div>
  <button id="btn-recenter" onclick="recenter()">📍</button>
  <div id="nav-panel">
    <div id="turn-primary">
      <div id="turn-arrow-wrap"><div id="turn-arrow">⬆</div></div>
      <div id="turn-info">
        <div id="turn-distance">GPS待機中</div>
        <div id="turn-direction">—</div>
      </div>
    </div>
    <div id="turn-next"><span class="next-label">次：</span><span class="next-val">—</span></div>
    <div id="nav-controls">
      <button class="ctrl-btn" onclick="goBackToList()">← 一覧</button>
      <button class="ctrl-btn" id="btn-voice" onclick="toggleVoice()">🔊 音声</button>
      <button class="ctrl-btn" onclick="rerouteToNearest()">🔄 復帰</button>
      <div id="nav-status">—</div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
'use strict';

const DB_NAME        = 'gpxnav-db';
const DB_VERSION     = 1;
const STORE          = 'routes';
const TILE_URL       = 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
const PREFETCH_ZOOMS = [13, 14, 15];
const ANNOUNCE_300   = 300;
const ANNOUNCE_100   = 100;
const ANNOUNCE_AT    = 20;

// ── IndexedDB ──
let db;
function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => e.target.result.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror   = e => rej(e);
  });
}
const dbTx     = (mode, fn) => new Promise((res, rej) => { const req = fn(db.transaction(STORE, mode).objectStore(STORE)); req.onsuccess = e => res(e.target.result); req.onerror = rej; });
const dbSave   = r  => dbTx('readwrite', s => s.add(r));
const dbGetAll = () => dbTx('readonly',  s => s.getAll());
const dbDelete = id => dbTx('readwrite', s => s.delete(id));

// ── GPX Parser ──
function parseGPX(text) {
  const doc = new DOMParser().parseFromString(text, 'text/xml');
  const NS  = 'http://www.topografix.com/GPX/1/1';
  const getEls  = (p, t) => [...p.getElementsByTagNameNS(NS, t), ...p.getElementsByTagName(t)];
  const getText = (p, t) => { const el = getEls(p, t)[0]; return el ? el.textContent.trim() : ''; };

  const name = getText(doc, 'name') || getText(doc, 'n') || 'ルート';

  const track = [];
  let prevKey = null;
  for (const el of getEls(doc, 'trkpt')) {
    const lat = parseFloat(el.getAttribute('lat'));
    const lon = parseFloat(el.getAttribute('lon'));
    if (isNaN(lat) || isNaN(lon)) continue;
    const key = `${lat.toFixed(6)},${lon.toFixed(6)}`;
    if (key === prevKey) continue;
    prevKey = key;
    track.push({ lat, lon });
  }

  const turns = getEls(doc, 'wpt').map(el => ({
    lat:  parseFloat(el.getAttribute('lat')),
    lon:  parseFloat(el.getAttribute('lon')),
    name: getText(el, 'name') || getText(el, 'n') || '通過点',
  })).filter(p => !isNaN(p.lat) && !isNaN(p.lon));

  return { name, track, turns };
}

// ── Geo Utils ──
function geoDist(lat1, lon1, lat2, lon2) {
  const R = 6371000, dL = (lat2-lat1)*Math.PI/180, dN = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dL/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dN/2)**2;
  return R * 2 * Math.asin(Math.sqrt(Math.min(1, a)));
}
const formatDist = m => m >= 1000 ? `${(m/1000).toFixed(1)}km` : `${Math.round(m)}m`;

function latLonToTile(lat, lon, z) {
  const n = 2**z;
  return {
    x: Math.floor((lon+180)/360*n),
    y: Math.floor((1 - Math.log(Math.tan(lat*Math.PI/180) + 1/Math.cos(lat*Math.PI/180))/Math.PI)/2*n)
  };
}

// ── Tile Prefetch ──
async function prefetchTiles(track, onProgress) {
  if (!('caches' in window)) { onProgress?.(1,1); return; }
  const tileSet = new Set();
  const step = Math.max(1, Math.floor(track.length/150));
  for (let i = 0; i < track.length; i += step) {
    for (const z of PREFETCH_ZOOMS) {
      const {x, y} = latLonToTile(track[i].lat, track[i].lon, z);
      for (let dx=-1; dx<=1; dx++) for (let dy=-1; dy<=1; dy++) tileSet.add(`${z}/${x+dx}/${y+dy}`);
    }
  }
  const tiles = [...tileSet];
  const cache = await caches.open('gpxnav-tiles-v1');
  let done = 0;
  for (const tile of tiles) {
    try {
      const url = `https://tile.openstreetmap.org/${tile}.png`;
      if (!await cache.match(url)) { const r = await fetch(url, {mode:'cors'}); if (r.ok) await cache.put(url, r); }
    } catch {}
    onProgress?.(++done, tiles.length);
    await new Promise(r => setTimeout(r, 50));
  }
}

// ── List Screen ──
function openFilePicker() { document.getElementById('file-input').click(); }

async function handleFileImport(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';
  let text;
  try { text = await file.text(); } catch { showToast('ファイル読み込み失敗'); return; }

  const parsed = parseGPX(text);
  if (parsed.track.length < 2) { showToast('GPXの解析に失敗しました'); return; }

  let totalDist = 0;
  for (let i = 1; i < parsed.track.length; i++)
    totalDist += geoDist(parsed.track[i-1].lat, parsed.track[i-1].lon, parsed.track[i].lat, parsed.track[i].lon);

  const route = { name: parsed.name, distKm: (totalDist/1000).toFixed(1), track: parsed.track, turns: parsed.turns, importedAt: Date.now() };
  await dbSave(route);
  await renderRouteList();
  showToast(`「${route.name}」を追加 (${parsed.turns.length}ターン)`);

  const prog = document.getElementById('import-progress');
  const msg  = document.getElementById('import-msg');
  const bar  = document.getElementById('progress-bar');
  prog.style.display = 'block';
  prefetchTiles(parsed.track, (done, total) => {
    msg.textContent = `📡 オフライン用タイルキャッシュ中... ${Math.round(done/total*100)}%`;
    bar.style.width = Math.round(done/total*100) + '%';
  }).then(() => { prog.style.display = 'none'; showToast('キャッシュ完了 — オフライン走行可能です'); })
    .catch(() => { prog.style.display = 'none'; });
}

async function renderRouteList() {
  const routes = await dbGetAll();
  const el = document.getElementById('route-list-container');
  if (routes.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🗺️</div><p>ルートがありません<br>「＋ ルート追加」から<br>GPXファイルを読み込んでください</p></div>`;
    return;
  }
  el.innerHTML = routes.reverse().map(r => `
    <div class="route-card" onclick="startNavigation(${r.id})">
      <div class="route-icon">🚴</div>
      <div class="route-info">
        <div class="route-name">${escHtml(r.name)}</div>
        <div class="route-meta"><span>${r.distKm} km</span> &nbsp;|&nbsp; ターン ${r.turns.length}件</div>
      </div>
      <button class="btn-delete" onclick="event.stopPropagation(); deleteRoute(${r.id})">削除</button>
    </div>`).join('');
}

async function deleteRoute(id) {
  if (!confirm('このルートを削除しますか？')) return;
  await dbDelete(id);
  await renderRouteList();
}

const escHtml = s => s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

// ── Navigation ──
let map = null, posMarker = null, currentRoute = null, watchId = null;
let nearestIdx = 0, cumDist = [], turnTrackIdx = [];
let announced = new Set(), voiceEnabled = true, followMode = true;

const TURN_STYLE = {
  '右折':     { arrow: '⇒', color: 'var(--right)',  bg: '#2a0808' },
  '左折':     { arrow: '⇐', color: 'var(--left)',   bg: '#08112a' },
  'やや右':   { arrow: '↗', color: 'var(--slight)', bg: '#2a1a08' },
  'やや左':   { arrow: '↖', color: 'var(--slight)', bg: '#1a082a' },
  '直進維持': { arrow: '⬆', color: 'var(--go)',     bg: '#082a14' },
};
const getTurnStyle = name => TURN_STYLE[name] || TURN_STYLE['直進維持'];

async function startNavigation(routeId) {
  const routes = await dbGetAll();
  currentRoute = routes.find(r => r.id === routeId);
  if (!currentRoute) return;

  nearestIdx = 0; announced = new Set(); followMode = true; voiceEnabled = true;
  document.getElementById('btn-voice').textContent = '🔊 音声';
  document.getElementById('btn-voice').classList.remove('muted');

  const track = currentRoute.track;
  cumDist = [0];
  for (let i = 1; i < track.length; i++)
    cumDist.push(cumDist[i-1] + geoDist(track[i-1].lat, track[i-1].lon, track[i].lat, track[i].lon));

  turnTrackIdx = currentRoute.turns.map(t => {
    let best = 0, bestD = Infinity;
    for (let i = 0; i < track.length; i++) {
      const d = geoDist(t.lat, t.lon, track[i].lat, track[i].lon);
      if (d < bestD) { bestD = d; best = i; }
    }
    return best;
  });

  showScreen('nav');
  requestAnimationFrame(() => setTimeout(initMap, 50));
}

function initMap() {
  if (map) { map.remove(); map = null; }
  const track = currentRoute.track;
  map = L.map('map', { zoomControl: true }).setView([track[0].lat, track[0].lon], 15);
  L.tileLayer(TILE_URL, { attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>', maxZoom: 19, maxNativeZoom: 18 }).addTo(map);

  L.polyline(track.map(p => [p.lat, p.lon]), { color: '#00d4ff', weight: 5, opacity: 0.75 }).addTo(map);
  L.marker([track[0].lat, track[0].lon], { icon: L.divIcon({ html: '<div style="font-size:22px">🟢</div>', iconSize:[22,22], iconAnchor:[11,11] }) }).bindTooltip('スタート').addTo(map);
  L.marker([track[track.length-1].lat, track[track.length-1].lon], { icon: L.divIcon({ html: '<div style="font-size:22px">🏁</div>', iconSize:[22,22], iconAnchor:[11,11] }) }).bindTooltip('ゴール').addTo(map);

  currentRoute.turns.forEach((t, i) => {
    const s = getTurnStyle(t.name);
    L.circleMarker([t.lat, t.lon], { radius:7, color:s.color, fillColor:s.color, fillOpacity:0.9, weight:2 })
     .bindTooltip(`${i+1}. ${s.arrow} ${t.name}`).addTo(map);
  });

  posMarker = L.marker([track[0].lat, track[0].lon], {
    icon: L.divIcon({
      html: '<div style="width:18px;height:18px;background:#ff4757;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(255,71,87,0.6)"></div>',
      iconSize:[18,18], iconAnchor:[9,9]
    }), zIndexOffset: 1000
  });

  map.on('dragstart', () => { followMode = false; });
  map.fitBounds(L.polyline(track.map(p=>[p.lat,p.lon])).getBounds(), { padding:[30,30] });
  startGPS();
}

function startGPS() {
  if (!navigator.geolocation) { setNavMsg('⚠', 'GPS非対応', ''); return; }
  unlockAudio();
  watchId = navigator.geolocation.watchPosition(
    onGPSUpdate,
    () => { document.getElementById('nav-status').textContent = 'GPS取得中...'; },
    { enableHighAccuracy: true, maximumAge: 2000, timeout: 15000 }
  );
}

function onGPSUpdate(pos) {
  const lat = pos.coords.latitude, lon = pos.coords.longitude;
  posMarker.setLatLng([lat, lon]);
  if (!map.hasLayer(posMarker)) posMarker.addTo(map);
  if (followMode) map.setView([lat, lon], map.getZoom());
  document.getElementById('nav-status').textContent = `±${Math.round(pos.coords.accuracy)}m`;

  const track = currentRoute.track;
  let best = nearestIdx, bestD = Infinity;
  for (let i = Math.max(0, nearestIdx-5); i <= Math.min(track.length-1, nearestIdx+40); i++) {
    const d = geoDist(lat, lon, track[i].lat, track[i].lon);
    if (d < bestD) { bestD = d; best = i; }
  }
  nearestIdx = best;
  updateNavPanel(lat, lon);
}

function updateNavPanel(lat, lon) {
  const track = currentRoute.track, turns = currentRoute.turns;

  const goalDist = geoDist(lat, lon, track[track.length-1].lat, track[track.length-1].lon);
  if (goalDist < 30 && nearestIdx > track.length * 0.95) {
    setNavMsg('🏁', 'ゴール！', 'お疲れ様でした！');
    if (!announced.has('goal')) { speak('ゴールです。お疲れ様でした！'); announced.add('goal'); }
    return;
  }

  let nextTI = -1;
  for (let ti = 0; ti < turns.length; ti++) {
    if (turnTrackIdx[ti] > nearestIdx) { nextTI = ti; break; }
  }

  if (nextTI === -1) {
    const s = getTurnStyle('直進維持');
    document.getElementById('turn-arrow-wrap').style.background = s.bg;
    document.getElementById('turn-arrow').textContent = s.arrow;
    document.getElementById('turn-arrow').style.color = s.color;
    document.getElementById('turn-distance').style.color = 'var(--text)';
    if (nearestIdx / track.length < 0.5) {
      document.getElementById('turn-distance').textContent = '直進';
      document.getElementById('turn-direction').textContent = 'コース上を走行中';
    } else {
      document.getElementById('turn-distance').textContent = formatDist(goalDist);
      document.getElementById('turn-direction').textContent = 'このままゴールへ';
    }
    document.getElementById('turn-next').innerHTML = '<span class="next-label">次：</span><span class="next-val">ターンなし</span>';
    return;
  }

  const turn = turns[nextTI], tIdx = turnTrackIdx[nextTI], s = getTurnStyle(turn.name);
  const totalDist = Math.max(0,
    geoDist(lat, lon, track[nearestIdx].lat, track[nearestIdx].lon) + cumDist[tIdx] - cumDist[nearestIdx]);

  document.getElementById('turn-arrow-wrap').style.background    = s.bg;
  document.getElementById('turn-arrow').textContent              = s.arrow;
  document.getElementById('turn-arrow').style.color              = s.color;
  document.getElementById('turn-distance').textContent           = formatDist(totalDist);
  document.getElementById('turn-distance').style.color           = s.color;
  document.getElementById('turn-direction').textContent          = `先 ${turn.name}`;

  const nn = turns[nextTI + 1];
  if (nn) {
    const ns = getTurnStyle(nn.name);
    const nd = cumDist[turnTrackIdx[nextTI+1]] - cumDist[nearestIdx];
    document.getElementById('turn-next').innerHTML =
      `<span class="next-label">次：</span><span class="next-val" style="color:${ns.color}">${ns.arrow} ${nn.name}</span><span class="next-val">　${formatDist(nd)}先</span>`;
  } else {
    document.getElementById('turn-next').innerHTML =
      `<span class="next-label">次：</span><span class="next-val">このターン後はゴールまで直進</span>`;
  }

  const k300=`${nextTI}-300`, k100=`${nextTI}-100`, k0=`${nextTI}-0`;
  if (totalDist <= ANNOUNCE_300 && !announced.has(k300)) { speak(`300メートル先、${turn.name}です`); announced.add(k300); }
  if (totalDist <= ANNOUNCE_100 && !announced.has(k100)) { speak(`まもなく${turn.name}です`);        announced.add(k100); }
  if (totalDist <= ANNOUNCE_AT  && !announced.has(k0))   { speak(`${turn.name}してください`);         announced.add(k0); }
}

function setNavMsg(arrow, dist, dir) {
  document.getElementById('turn-arrow').textContent     = arrow;
  document.getElementById('turn-distance').textContent  = dist;
  document.getElementById('turn-direction').textContent = dir;
}

function recenter() {
  followMode = true;
  if (posMarker && map.hasLayer(posMarker))
    map.setView(posMarker.getLatLng(), Math.max(map.getZoom(), 15));
}

function rerouteToNearest() {
  if (!currentRoute || !posMarker) return;
  const pos = posMarker.getLatLng(), turns = currentRoute.turns;
  if (turns.length === 0) { showToast('ターンポイントがありません'); return; }
  let bestTI = 0, bestD = Infinity;
  for (let ti = 0; ti < turns.length; ti++) {
    const d = geoDist(pos.lat, pos.lng, turns[ti].lat, turns[ti].lon);
    if (d < bestD) { bestD = d; bestTI = ti; }
  }
  nearestIdx = Math.max(0, turnTrackIdx[bestTI] - 1);
  showToast(`「${turns[bestTI].name}」へ復帰（${Math.round(bestD)}m先）`);
  updateNavPanel(pos.lat, pos.lng);
}

// ── Voice ──
function unlockAudio() {
  if (!('speechSynthesis' in window)) return;
  const d = new SpeechSynthesisUtterance(' '); d.volume = 0; d.lang = 'ja-JP'; speechSynthesis.speak(d);
}
function speak(text) {
  if (!voiceEnabled || !('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text); u.lang='ja-JP'; u.rate=1.0; u.pitch=1.0; u.volume=1.0;
  speechSynthesis.speak(u);
}
function toggleVoice() {
  voiceEnabled = !voiceEnabled;
  const btn = document.getElementById('btn-voice');
  if (voiceEnabled) { btn.textContent='🔊 音声'; btn.classList.remove('muted'); speak('音声案内を開始します'); }
  else              { speechSynthesis.cancel(); btn.textContent='🔇 音声'; btn.classList.add('muted'); }
}

// ── Screen ──
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${name}`).classList.add('active');
  if (name === 'nav') setTimeout(() => map && map.invalidateSize(), 100);
}
function goBackToList() {
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  if ('speechSynthesis' in window) speechSynthesis.cancel();
  showScreen('list'); renderRouteList();
}

// ── Toast ──
let toastTimer;
function showToast(msg, ms=3500) {
  clearTimeout(toastTimer);
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.display = 'block';
  toastTimer = setTimeout(() => { el.style.display = 'none'; }, ms);
}

// ── Service Worker ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(e => console.warn('SW:', e)));
}

// ── Init ──
openDB().then(renderRouteList);
</script>
